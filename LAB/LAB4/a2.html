<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        let n1=parseInt(prompt("enter number:"))
        let n2=parseInt(prompt("enter number:"))
        for(let n=n1;n<=n2;n++){
            let count=0
            for(let i=2;i<n;i++ ){
                if(n%i==0)
                count++
            }
            if(count==0){
                document.write(n+" ,")
            }
        }
        
    </script>
</body>
</html>
