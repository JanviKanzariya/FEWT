<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n=parseInt(prompt("enter number:"))
          let temp=1
        for(let i=0;i<=n;i++){
            for(let j=0;j<=i;j++){

                    document.write(temp)
                    if(temp==0)
                    temp=1
                else 
                temp=0
            }
            document.write("<br/>")
        }
    </script>
</body>
