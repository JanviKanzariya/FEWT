<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n=parseInt(prompt("enter number:"))
        let n2=n%10;
        let n1=parseInt(n/10)
        let ans=1
        for(let i=0;i<n2;i++){
            ans=ans*n1
        }
          document.write(ans)
    </script>
</body>
</html>
