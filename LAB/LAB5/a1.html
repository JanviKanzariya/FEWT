<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n=parseInt(prompt("enter size"))
        let arr=[]
        let max=0
        for (let i = 0; i < n; i++) {
           
            arr[i]=parseInt(prompt("enter element"))
            
        }
        for (let index = 0; index < n; index++) {
        if(arr[index]<arr[index+1])
           max=arr[index+1]
       else
            max=arr[index]
        }
        document.write(arr)
        document.write("<br>")
        document.write("max element"+max)

    
    </script>
</body>
</html>
