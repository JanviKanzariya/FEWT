<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n=parseInt(prompt("enter size"))
        let arr=[]
        let max=0
        for (let i = 0; i < n; i++) {
           
            arr[i]=parseInt(prompt("enter element"))
            
        }
        
        
        for(let i=0;i<n;i++){
            for(let j=i+1;j<n;j++){
           
            if(arr[i]>arr[j]){
              let temp=arr[i]
               arr[i]=arr[j]
               arr[j]=temp
            }
        }
        }
        document.write(arr)
    </script>
</body>
</html>
