<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    let arr =[10,20,30,40,50]
    document.write("orginal arr"+arr+"<br />");
   
    arr.push("60")
    document.write("push(60)"+arr+"<br />");

    arr.pop()
    document.write("pop()"+arr+"<br />");

    arr.shift()
    document.write("shift()"+arr+"<br />");

    arr.unshift(60)
    document.write("unshift"+arr+"<br />");

    arr.splice(1,2)
    document.write("splice(1,2)"+arr+"<br />");

    let ans=arr.slice(1,3)
    document.write("slice(1,3)"+ans+"<br />");

    arr.sort()
    document.write("sort()"+arr+"<br />");

    </script>
</body>
</html>
